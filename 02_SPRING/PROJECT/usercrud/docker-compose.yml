# ═══════════════════════════════════════════════════════════════
# DOCKER COMPOSE — UserCRUD Multi-Container Setup
# ═══════════════════════════════════════════════════════════════
# ONE FILE = entire app stack (MySQL + Spring Boot)
#
# Commands:
# docker-compose up -d --build    # build + start (background)
# docker-compose ps                # status
# docker-compose logs -f app       # follow app logs
# docker-compose stop              # stop containers (data safe)
# docker-compose down              # stop + remove containers
# docker-compose down -v           # also delete volumes (DATA GONE)
#
# Network:
# Compose auto-creates a default network "<projectname>_default"
# Both services join it automatically
# Service NAME (mysql, app) = DNS hostname for inter-container talk
# ═══════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────
  # MySQL DATABASE service
  # ─────────────────────────────────────────────
  mysql:                          # ← service name (= DNS hostname)
    image: mysql:8                 # ← image to use
    container_name: mysql-userdb   # ← actual container name (for docker exec)

    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: userdb       # ← auto-create userdb on startup

    ports:
      - "3307:3306"                # ← host:container (Workbench connect)
                                    # Optional — internal traffic doesn't need this
                                    # Useful for external tools to inspect

    volumes:
      - mysql_data:/var/lib/mysql  # ← persist data (named volume)

    healthcheck:                   # ← MySQL "ready?" check
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10                  # ← retry up to 10 times before "unhealthy"

    restart: unless-stopped        # ← auto-restart on crash


  # ─────────────────────────────────────────────
  # Spring Boot APP service
  # ─────────────────────────────────────────────
  app:                             # ← service name (= DNS hostname)
    build: .                        # ← build from Dockerfile in current dir
                                    # Builds usercrud:latest image
    container_name: usercrud-app

    ports:
      - "8080:8080"                # ← host:container (Postman connect)

    depends_on:                    # ← wait for mysql before starting
      mysql:
        condition: service_healthy # ← wait for MySQL HEALTHCHECK = healthy
                                    # (not just "container started")

    environment:
      SPRING_PROFILES_ACTIVE: compose   # ← activate compose profile
                                         # → uses application-compose.properties
                                         # → connects to "mysql:3306" by name

    restart: unless-stopped


# ═══════════════════════════════════════════════════════════════
# VOLUMES — declare named volumes
# ═══════════════════════════════════════════════════════════════
volumes:
  mysql_data:
    external: true                 # ← REUSE existing volume (Arpan's data)
                                    # Without external: true, compose creates
                                    # "usercrud_mysql_data" (NEW empty volume)
                                    # external: true = use pre-created mysql_data
