# ═══════════════════════════════════════════════════════════════
# DOCKER MYSQL PROFILE — application-docker.properties
# ═══════════════════════════════════════════════════════════════
# Active when: spring.profiles.active=docker
#
# Target: Docker container with MySQL 8
# • Container name: mysql-userdb
# • Image:          mysql:8 (8.4.9 actual)
# • Host port:      3307 → Container port 3306 (mapping)
# • User:           root
# • Password:       rootpass (set via -e MYSQL_ROOT_PASSWORD)
# • Database:       userdb (auto-created via -e MYSQL_DATABASE)
# • Volume:         mysql_data (data persistence)
#
# Container start command (reference):
# docker run -d --name mysql-userdb \
# -e MYSQL_ROOT_PASSWORD=rootpass \
# -e MYSQL_DATABASE=userdb \
# -p 3307:3306 \
# -v mysql_data:/var/lib/mysql \
# mysql:8
#
# Workbench mein dekhne ke liye:
# • Host: 127.0.0.1
# • Port: 3307
# • User: root / Password: rootpass
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://localhost:3307/userdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=rootpass
