# ═══════════════════════════════════════════════════════════════
#  📌 SPRING BOOT CONFIG — application.properties
# ═══════════════════════════════════════════════════════════════
#  Spring Boot ka externalized config file. Yahaan likha har value
#  Spring boot ke @Value, @ConfigurationProperties, ya internal
#  auto-configuration tak pahunch jata hai.
#
#  Spring profiles use kar sakte ho:
#    application-dev.properties   → dev environment
#    application-prod.properties  → production environment
#    spring.profiles.active=dev   → which one active rahega
#
#  YAML alternative: application.yml (cleaner nested structure)
# ═══════════════════════════════════════════════════════════════

spring.application.name=usercrud


# ═════════════════════════════════════════════════════════════════
# MYSQL DATABASE (Docker container)
# ═════════════════════════════════════════════════════════════════
# Container details (chalu hai):
#   Image: mysql:8
#   Name: mysql-userdb
#   Host port: 3307  →  Container port: 3306
#   Root password: rootpass
#   Auto-created DB: userdb
#
# JDBC URL breakdown: jdbc:mysql://HOST:PORT/DATABASE
#   localhost = tera laptop (host)
#   3307      = mapped host port (container ka 3306)
#   userdb    = database name (auto-created via MYSQL_DATABASE env)
#
# Driver: com.mysql.cj.jdbc.Driver
#   "cj" = Connector/J (MySQL ka official Java driver)
#   pom.xml mein dependency: com.mysql:mysql-connector-j
#
# Production tip: passwords env vars se inject (yahaan hardcoded sirf
# learning ke liye — real apps mein NEVER commit)
# ═════════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3307/userdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=rootpass


# ─────────────────────────────────────────────────────────────────
# JPA / HIBERNATE
# ─────────────────────────────────────────────────────────────────
# database-platform → Hibernate ko DB-specific SQL dialect bata
#                     MySQL8Dialect = MySQL 8.x ka SQL flavor
#                     (H2, MySQL, PostgreSQL — har ka alag dialect)
#
# ddl-auto values (interview puchega):
#   none         → kuch nahi kar (production default)
#   validate     → schema match karo entities se, mismatch = error
#   update       → entities ke according table modify
#                  (dev ke liye — column add hone pe auto reflect)
#   create       → har startup pe schema drop + create
#   create-drop  → startup create, shutdown drop (test ke liye)
#
# show-sql → console mein actual SQL queries print
#            (dev mein helpful, production mein OFF)
# ─────────────────────────────────────────────────────────────────
# Hibernate 7.x note (Spring Boot 4.x):
#   MySQL8Dialect REMOVED (existed till Hibernate 5.x, deprecated in 6.x)
#   Naya: MySQLDialect — auto-detects version from JDBC connection
#   (Connector/J already MySQL 8.x se baat kar raha — version pakad lega)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ─────────────────────────────────────────────────────────────────
# 🗄️ DB Inspect (MySQL — no in-app console like H2)
# ─────────────────────────────────────────────────────────────────
# H2 console removed — MySQL alag tool se inspect:
#
# Option 1: Container ke andar mysql client
#   docker exec -it mysql-userdb mysql -u root -prootpass
#   USE userdb;
#   SHOW TABLES;
#   SELECT * FROM users;
#
# Option 2: GUI client (laptop pe install)
#   • MySQL Workbench (official)
#   • DBeaver (free, multi-DB)
#   • TablePlus
#   Connect: localhost:3307, user=root, password=rootpass
# ─────────────────────────────────────────────────────────────────


# ═════════════════════════════════════════════════════════════════
# JWT CONFIG — Token signing + expiration
# ═════════════════════════════════════════════════════════════════
# secret    → 256-bit (32 char minimum) random key for HMAC SHA-256
#             Production: env variable / AWS Secrets Manager se load
#             Dev/local: yahaan rakh sakte (commit nahi karna ideally)
# expiration→ Access token validity (milliseconds)
#             900000 = 15 min (industry standard for access tokens)
# refresh   → Refresh token validity (milliseconds)
#             604800000 = 7 days (industry standard)
# ═════════════════════════════════════════════════════════════════
jwt.secret=mySuperSecretKeyForJWTTokenSigning256BitMinimumLength
jwt.expiration=900000
jwt.refresh.expiration=604800000
