# ═══════════════════════════════════════════════════════════════
#  📌 SPRING BOOT MASTER CONFIG — application.properties
# ═══════════════════════════════════════════════════════════════
#  Common settings — load HAR profile mein.
#  DB-specific settings → application-{profile}.properties mein.
#
#  PROFILES setup:
#    application-local.properties   → Local MySQL57 (port 3306)
#    application-docker.properties  → Docker MySQL (port 3307)
#
#  ACTIVATE profile (3 ways):
#    1. Default (yeh file): spring.profiles.active=local (yahan set)
#    2. Command line:        java -jar app.jar --spring.profiles.active=docker
#    3. Env variable:        $env:SPRING_PROFILES_ACTIVE="docker"
#
#  Precedence: env var > command line > properties file
# ═══════════════════════════════════════════════════════════════

spring.application.name=usercrud


# ─────────────────────────────────────────────────────────────────
# 🎯 ACTIVE PROFILE — switch karne ke liye yeh value badlo
#    OR command line se override: --spring.profiles.active=docker
# ─────────────────────────────────────────────────────────────────
spring.profiles.active=local


# ─────────────────────────────────────────────────────────────────
# JPA / HIBERNATE (common — both MySQLs ke liye)
# ─────────────────────────────────────────────────────────────────
# Universal MySQL dialect (works for MySQL 5.7 + 8.x both)
# Hibernate 7+ specific (MySQL8Dialect REMOVED, ye new universal use karo)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto values (interview puchega):
#   none         → kuch nahi kar (production default)
#   validate     → schema match karo entities se, mismatch = error
#   update       → entities ke according table modify (dev ke liye)
#   create       → har startup pe schema drop + create
#   create-drop  → startup create, shutdown drop (test ke liye)
spring.jpa.hibernate.ddl-auto=update

# Console mein actual SQL queries print (dev helpful, production OFF)
spring.jpa.show-sql=true


# ═════════════════════════════════════════════════════════════════
# JWT CONFIG — Token signing + expiration (common)
# ═════════════════════════════════════════════════════════════════
# secret    → 256-bit (32 char minimum) random key for HMAC SHA-256
#             Production: env variable / AWS Secrets Manager se load
# expiration→ Access token validity (milliseconds)
#             900000 = 15 min (industry standard)
# refresh   → Refresh token validity (milliseconds)
#             604800000 = 7 days (industry standard)
# ═════════════════════════════════════════════════════════════════
jwt.secret=mySuperSecretKeyForJWTTokenSigning256BitMinimumLength
jwt.expiration=900000
jwt.refresh.expiration=604800000
