# ═══════════════════════════════════════════════════════════════
#  📌 LOCAL MYSQL PROFILE — application-local.properties
# ═══════════════════════════════════════════════════════════════
#  Active when: spring.profiles.active=local
#
#  Target: Tera laptop ka native MySQL57 install
#    • Service: MySQL57 (Windows Service, auto-running)
#    • Port:    3306 (default MySQL port)
#    • User:    root
#    • Password: root
#    • Database: userdb (manual create kiya tha SQL se)
#
#  Workbench mein dekhne ke liye:
#    • Host: localhost
#    • Port: 3306
#    • User: root / Password: root
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://localhost:3306/userdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
