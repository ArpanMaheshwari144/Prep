# ═══════════════════════════════════════════════════════════════
# COMPOSE PROFILE — application-compose.properties
# ═══════════════════════════════════════════════════════════════
# Active when: spring.profiles.active=compose
#
# Use case: BOTH Spring Boot AND MySQL run as containers
# on SAME Docker network (via docker-compose)
#
# KEY DIFFERENCE from application-docker.properties:
# • Docker profile  → Spring on HOST, MySQL in container
# URL: localhost:3307 (mapped port)
# • Compose profile → Spring IN container + MySQL IN container
# URL: mysql:3306 (container DNS + INTERNAL port)
# No port mapping needed for internal traffic
#
# Network magic:
# docker-compose auto-creates a default network
# Both services join it
# Service NAME = DNS hostname (mysql, app)
# "mysql:3306" resolves to MySQL container's internal address
#
# Activate via env var (in docker-compose.yml):
# environment:
# SPRING_PROFILES_ACTIVE: compose
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://mysql:3306/userdb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=rootpass
