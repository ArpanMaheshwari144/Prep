# ════════════════════════════════════════════════════════════
# 🔐 MySQL Secret — Sensitive Data (root password)
# ════════════════════════════════════════════════════════════
# Yeh file MySQL ka root password store karti.
#
# Why Secret (not ConfigMap)?
#   • Password = sensitive data
#   • Secret type "Opaque" = generic secret
#   • base64 encoded (NOT encrypted! — for real prod use Vault)
#
# Apply command:
#   kubectl apply -f mysql-secret.yaml
#
# Verify:
#   kubectl get secrets
#   kubectl describe secret mysql-secret
# ════════════════════════════════════════════════════════════

apiVersion: v1                     # ← K8s API version (v1 = core)
kind: Secret                        # ← Resource type: Secret
metadata:
  name: mysql-secret                # ← Naam (Deployment isi se reference karega)
type: Opaque                        # ← Generic secret (most common type)

stringData:                         # ← stringData = plain text (auto base64-encode)
  MYSQL_ROOT_PASSWORD: rootpass     # ← Same password we used in docker-compose

# Note: data: vs stringData:
#   data:        manually base64-encoded values needed
#   stringData:  K8s auto-encodes (easier)
#
# Production tip: in real apps, this Secret would come from
# Vault / AWS Secrets Manager — never plain text in YAML
