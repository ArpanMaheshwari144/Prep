# ════════════════════════════════════════════════════════════
# UserCRUD Service — External Access (NodePort)
# ════════════════════════════════════════════════════════════
# Type: NodePort
# • External access via host's port (30080 here)
# • Postman se hit kar sakte: localhost:30080
#
# Production would use LoadBalancer, but for local dev NodePort sufficient
#
# Apply:
# kubectl apply -f usercrud-service.yaml
#
# Test:
# curl http://localhost:30080/auth/login
# ════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: usercrud-service

spec:
  type: NodePort                    # ← External access enabled

  selector:
    app: usercrud                   # ← Match Spring Boot pod label

  ports:
  - port: 8080                      # ← Service port
    targetPort: 8080                # ← Pod's port
    nodePort: 30080                 # ← External port on host (30000-32767 range)
                                     # localhost:30080 se reach kar sakte
    protocol: TCP
