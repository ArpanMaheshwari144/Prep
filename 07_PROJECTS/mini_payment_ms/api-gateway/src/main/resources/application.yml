spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-service
              uri: http://localhost:8081
              predicates:
                - Path=/order
            - id: payment-service
              uri: http://localhost:8082
              predicates:
                - Path=/pay
    compatibility-verifier:
      enabled: false

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.servlet: DEBUG