# mysql.yaml — MySQL stack (PVC + Deployment + Service)

# ─── PVC — Persistent Volume Claim ───
# Pod restart pe data preserve rahe
# Docker compose ka "named volume" ka equivalent
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce     # ek node se mount
  resources:
    requests:
      storage: 1Gi      # 1 GB allocate
---
# ─── DEPLOYMENT — MySQL pod blueprint ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8        # k8s khud pull karega Docker Hub se
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root
        - name: MYSQL_DATABASE
          value: tododb        # auto-create on first start

        # Container ke andar /var/lib/mysql pe PVC mount
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
---
# ─── SERVICE — internal DNS access ───
# App pod "mysql:3306" se reach karega
# ClusterIP = internal only, external access nahi
apiVersion: v1
kind: Service
metadata:
  name: mysql            # yeh DNS name banta cluster ke andar
spec:
  selector:
    app: mysql           # in pods ko target kar
  ports:
  - port: 3306           # service port
    targetPort: 3306     # container port
  type: ClusterIP        # internal-only
