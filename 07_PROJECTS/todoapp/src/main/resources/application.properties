# ═══════════════════════════════════════════════════════════════
#  📌 SPRING BOOT CONFIG — application.properties
# ═══════════════════════════════════════════════════════════════
#  TODO App ka master configuration
#  MySQL connection + JPA settings yahan
# ═══════════════════════════════════════════════════════════════

# ─── APP IDENTITY ─────────────────────────────────────────────
spring.application.name=todoapp


# ─── MYSQL DATASOURCE ─────────────────────────────────────────
# Host: localhost (tera laptop ka native MySQL)
# Port: 3306 (MySQL default)
# DB:   tododb
# User: root / Password: root (UserCRUD pattern same)
#
# 🔑 ?createDatabaseIfNotExist=true
#    JDBC driver level param — pehli connection pe DB auto-create
#    Workbench mein manual CREATE DATABASE nahi karna
#    Spring Boot run → DB auto-banegi → tables auto-banengi (ddl-auto)
#    Production mein NEVER use (DBA banata DB)
spring.datasource.url=jdbc:mysql://localhost:3306/tododb?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root


# ─── JPA / HIBERNATE ──────────────────────────────────────────
# Universal MySQL dialect (5.7 + 8.x both)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto values:
#   none         → kuch nahi (production default)
#   validate     → schema match check, mismatch = error
#   update       → entities ke according table modify (DEV BEST)
#   create       → har startup pe schema drop + create (test)
#   create-drop  → startup create, shutdown drop (unit tests)
spring.jpa.hibernate.ddl-auto=update

# Console mein generated SQL queries print (dev helpful, prod OFF)
spring.jpa.show-sql=true
