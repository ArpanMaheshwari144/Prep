# ═══════════════════════════════════════════════════════════════
#  📌 SPRING BOOT CONFIG — application.properties
# ═══════════════════════════════════════════════════════════════
#  TODO App ka master configuration
#  MySQL connection + JPA settings yahan
# ═══════════════════════════════════════════════════════════════

# ─── APP IDENTITY ─────────────────────────────────────────────
spring.application.name=todoapp


# ─── MYSQL DATASOURCE ─────────────────────────────────────────
# Host: localhost (tera laptop ka native MySQL)
# Port: 3306 (MySQL default)
# DB:   tododb
# User: root / Password: root (UserCRUD pattern same)
#
# 🔑 ?createDatabaseIfNotExist=true
#    JDBC driver level param — pehli connection pe DB auto-create
#    Workbench mein manual CREATE DATABASE nahi karna
#    Spring Boot run → DB auto-banegi → tables auto-banengi (ddl-auto)
#    Production mein NEVER use (DBA banata DB)
spring.datasource.url=jdbc:mysql://localhost:3306/tododb?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root


# ─── JPA / HIBERNATE ──────────────────────────────────────────
# Universal MySQL dialect (5.7 + 8.x both)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ddl-auto values:
#   none         → kuch nahi (production default)
#   validate     → schema match check, mismatch = error
#   update       → entities ke according table modify (DEV BEST)
#   create       → har startup pe schema drop + create (test)
#   create-drop  → startup create, shutdown drop (unit tests)
spring.jpa.hibernate.ddl-auto=update

# Console mein generated SQL queries print (dev helpful, prod OFF)
spring.jpa.show-sql=true


# ─── JWT CONFIG ──────────────────────────────────────────────
# jwt.secret: HMAC-SHA256 signing key
#   MUST be ≥ 32 chars (256-bit minimum)
#   Local dev: any 32+ char string
#   Production: env variable / AWS Secrets Manager se
#   NEVER commit production secret to git
#
# jwt.expiration: token validity in milliseconds
#   900000 ms = 15 minutes (industry standard)
#   3600000 ms = 1 hour (longer apps)
#   86400000 ms = 24 hours (don't use for sensitive)
jwt.secret=mySuperSecretKeyForJwtTokenSigning256BitMinimum
jwt.expiration=900000


# ─── REDIS CONNECTION ────────────────────────────────
# Spring ko batao Redis kahaan chal raha
# host=localhost (Docker container same machine pe expose)
# port=6379     (Redis standard port — Docker run mein mapped)
# timeout=2sec  (slow Redis = fail fast, app stuck nahi hoga)
#
# Cache TTL + serializer config: RedisConfig.java mein
# (yahaan spring.cache.* properties ki zarurat nahi —
#  custom @Bean already handle karta)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms


# ─── DEBUG LOGS (dev only — production OFF) ──────────
# Cache miss/hit, key generate, Redis call — sab visible
# Useful for cache debugging; production mein hata do (noisy)
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
