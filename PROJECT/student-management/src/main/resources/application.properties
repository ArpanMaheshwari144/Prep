# =====================================================
# APPLICATION PROPERTIES — App ki poori configuration
# Spring Boot is file ko automatically padhta — naam EXACT hona chahiye
# src/main/resources/application.properties
# =====================================================

# ---- MySQL JDBC Connection ----
# JDBC = Java Database Connectivity — Java se DB connect karne ka standard
# JDBC URL format: jdbc:mysql://HOST:PORT/DATABASE_NAME
spring.datasource.url=jdbc:mysql://localhost:3306/student_db
# localhost = DB same machine pe. Docker mein "mysql" (container naam) hoga.
# 3306 = MySQL default port
# student_db = database naam (pehle MySQL mein create karna padega)

spring.datasource.username=root
spring.datasource.password=root
# MySQL ka username/password. Production mein environment variable se laao — code mein KABHI nahi.

# JDBC DRIVER — Spring Boot auto detect karta (mysql-connector-j dependency se)
# Manually set karna ho: spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# HIKARICP CONNECTION POOL — EXPLICIT CONFIGURATION
# =====================================================
# YE KYA HAI: HikariCP = Spring Boot ka DEFAULT Java connection pool library.
#             Ek "pool" (bucket) mein reusable DB connections rakhta.
#             Request aaye → pool se connection lo → kaam karo → wapas pool mein daalo.
#
# KYUN CHAHIYE: Har request pe new DB connection banana SLOW (TCP handshake + auth).
#               Pool se reuse karna FAST (~1ms overhead).
#               Production mein 100s of concurrent requests — bina pool ke DB crash ho jaye.
#
# NAHI LAGAYA TO KYA HOGA:
#   - Defaults mein chalega (maxPoolSize=10, timeout=30s) — kaam toh karega
#   - BUT production mein tuning zaruri — ye explicit config audit-friendly hai
#   - Default se load test mein exhaustion ho sakta hai bade scale pe
#
# REAL WORLD ANALOGY — Restaurant ki shuttle service:
#   Office (tera app) ↔ Restaurant (MySQL DB)
#   HikariCP = office ki 10 shuttles jo DB jaati-aati
#   Worker ko DB query karni → shuttle le → jao → kaam karo → shuttle wapas
#   Agar saari 10 shuttles busy → 11th worker 30 sec wait → timeout → ERROR
#
# "POOL EXHAUSTION" — production incident scenario:
#   External tool ne table LOCK kar di (long UPDATE)
#   App ki connections lock pe wait mein phas gayi (kaam khatam nahi ho raha)
#   10 ki 10 connections HELD → naye requests 30 sec wait → timeout → email fail
#   Error log: "Connection is not available, request timed out after 30000ms"

# MAX POOL SIZE — kitne connections pool mein max rakho
spring.datasource.hikari.maximum-pool-size=10
# Default 10. Rule of thumb: (core_count * 2) + effective_spindle_count for OLTP.
# 100+ lagane se DB suffer karta — quantity nahi, efficiency chahiye.

# MINIMUM IDLE — kitne connections hamesha ready rakhne hain (warm)
spring.datasource.hikari.minimum-idle=2
# Low traffic mein bhi 2 connections tayyaar — pehli request pe delay nahi.

# CONNECTION TIMEOUT — new request ko connection chahiye, kitna wait kare?
spring.datasource.hikari.connection-timeout=30000
# 30 sec (milliseconds). Pool exhausted hai → request 30 sec wait karega.
# Timeout ke baad SQLTransientConnectionException throw hoti.

# IDLE TIMEOUT — unused connection kab drop kare pool se
spring.datasource.hikari.idle-timeout=600000
# 10 min. Kam traffic mein extra connections release karo — DB side resources bachao.

# MAX LIFETIME — har connection ko kab forcefully recycle karo
spring.datasource.hikari.max-lifetime=1800000
# 30 min. Even healthy connection ko refresh — DB side timeout issues se bacho.

# POOL NAME — logs mein readable
spring.datasource.hikari.pool-name=StudentMgmtHikariPool
# Logs mein dikhai dega "StudentMgmtHikariPool" — debugging easy.

# =====================================================
# MONITORING TIPS (production):
# - HikariCP metrics expose karo (Micrometer + Actuator)
# - Alert laga pool utilization >80% — exhaustion se pehle warning
# - Agar "Connection is not available, timeout after 30000ms" dikhe:
#   → Pool exhausted. Check DB top waits — blocking queries?
#   → Check slow queries holding connections
#   → Consider query timeouts to auto-release stuck connections
# =====================================================

# ---- Hibernate / JPA Configuration ----
# Hibernate = JPA implementation. ORM — Java objects ↔ DB tables automatic mapping.
spring.jpa.hibernate.ddl-auto=update
# DDL-AUTO OPTIONS:
#   none     — kuch mat kar. Production mein YE USE KARO. Flyway/Liquibase se migration.
#   validate — table hai? fields match? Nahi toh ERROR. (prod mein safe check)
#   update   — table nahi hai? BANA DO. Field naya? COLUMN ADD. (development ke liye)
#              NOTE: Column DELETE nahi karta. Field hataya toh column rahega.
#   create   — Har baar DROP + CREATE. DATA GONE! (sirf testing)
#   create-drop — create + app band hote hi DROP. (unit testing)

spring.jpa.show-sql=true
# Console pe Hibernate ka generated SQL dikhao. Debugging ke liye.
# Example output: Hibernate: select s1_0.id,s1_0.age,s1_0.email,s1_0.name from students s1_0
# Production mein FALSE karo — performance impact + log flood.

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# DIALECT = Hibernate ko batao kaunsa DB hai.
# MySQL hai → MySQL specific SQL generate karo (LIMIT, AUTO_INCREMENT).
# PostgreSQL hota → PostgreSQLDialect → SERIAL, OFFSET.
# Dialect se Hibernate DB ke hisaab se optimized SQL banata.
#
# HIBERNATE INTERNALLY:
#   1. @Entity classes scan karta
#   2. ddl-auto ke hisaab se tables create/update/validate
#   3. EntityManagerFactory banata (sessions manage karne ke liye)
#   4. Repository methods → JPQL/HQL → SQL translate (dialect ke hisaab se)
#   5. HikariCP pool se connection le → SQL execute → result map → connection wapas

# ---- Server ----
server.port=8080
# Embedded Tomcat is port pe sunna start karega.
# 8080 = default. Badalna ho: server.port=9090

# ---- Redis — Cache Store ----
# Redis = in-memory data store. Key-value. Caching ke liye.
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Redis default port = 6379
# Docker mein: spring.data.redis.host=redis (container naam)
#
# BINA REDIS (default):
#   Cache = ConcurrentHashMap (Java mein memory).
#   App restart = cache GONE. Multiple servers = har server ka ALAG cache.
# REDIS KE SAATH:
#   Cache = Redis server (external).
#   App restart = cache SAFE. Multiple servers = SAME cache share.
#
# @Cacheable("student", key="#id") → Redis mein store:
#   KEY:   "student::1"
#   VALUE: serialized JSON
#   COMMAND: redis-cli GET "student::1"
